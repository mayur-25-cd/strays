name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Assemble app bundle
        run: ./scripts/build-app.sh release
